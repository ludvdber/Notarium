name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Java 25, Gradle 9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'

      - name: Compile
        run: ./gradlew compileJava compileTestJava --no-daemon

      - name: Unit tests
        run: ./gradlew test --no-daemon

      - name: Integration tests (Testcontainers)
        run: ./gradlew integrationTest --no-daemon

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            build/reports/tests/
            build/test-results/

  frontend:
    name: Frontend (React 19, Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check + build
        run: npm run build

      - name: Unit tests
        run: npx vitest run

  # E2E stays optional — it needs the full stack running.
  # Uncomment when a preview deployment is wired up.
  # e2e:
  #   runs-on: ubuntu-latest
  #   needs: [backend, frontend]
  #   steps:
  #     - uses: actions/checkout@v4
  #     - ...
