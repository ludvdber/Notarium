spring:
  datasource:
    # Overridden dynamically by @ServiceConnection Testcontainers
    url: jdbc:tc:postgresql:17:///freenote_test
    username: freenote
    password: freenote

  jpa:
    hibernate:
      ddl-auto: validate

  data:
    redis:
      # Overridden dynamically by @ServiceConnection Testcontainers
      host: localhost
      port: 6379

  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  security:
    oauth2:
      client:
        registration:
          discord:
            client-id: test-discord-id
            client-secret: test-discord-secret
          google:
            client-id: test-google-id
            client-secret: test-google-secret

app:
  jwt:
    secret: test-secret-key-must-be-at-least-64-bytes-long-for-hs512-algorithm-validation
    expiration-ms: 3600000
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: freenote-test
  meilisearch:
    host: http://localhost:7700
    api-key: test-master-key
  email:
    hash-salt: test-salt
  kofi:
    verification-token: test-kofi-token

freenote:
  cors:
    allowed-origins:
      - http://localhost:3000

logging:
  level:
    be.freenote: DEBUG
